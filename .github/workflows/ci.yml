name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown links
        run: |
          find . -name '*.md' -not -path './.git/*' | head -20
          echo "Markdown files present — CI placeholder"
